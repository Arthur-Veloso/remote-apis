<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arthur Veloso | Student ID - 77933</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
padding:20px;
background:#f4f4f4;
text-align:center;
}

/* Buttons */

button{
padding:10px 15px;
margin:10px;
font-size:16px;
cursor:pointer;
}

/* Grid layout for results */

#results{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

/* Card style */

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Remote APIs Demo</h1>

<button id="countriesBtn">Load Countries</button>
<button id="usersBtn">Load Users</button>
<button id="charactersBtn">Load Characters</button>

<br><br>

<!-- Dropdown for region -->
<select id="regionSelect">
<option value="europe">Europe</option>
<option value="asia">Asia</option>
<option value="africa">Africa</option>
</select>

<!-- Search box for characters -->
<input type="text" id="characterSearch" placeholder="Search character">

<div id="results"></div>

<script>

// Select elements
const results = document.getElementById("results");
const countriesBtn = document.getElementById("countriesBtn");
const usersBtn = document.getElementById("usersBtn");
const charactersBtn = document.getElementById("charactersBtn");

const regionSelect = document.getElementById("regionSelect");
const characterSearch = document.getElementById("characterSearch");

/* Fetch countries */

async function fetchCountries(){

try{

const region = regionSelect.value;

const response = await fetch(`https://restcountries.com/v3.1/region/${region}`);

const data = await response.json();

displayCountries(data);

}catch(error){

console.log("Error loading countries", error);

}

}

/* Fetch users */

async function fetchUsers(){

try{

const response = await fetch("https://jsonplaceholder.typicode.com/users");

const data = await response.json();

displayUsers(data);

}catch(error){

console.log("Error loading users", error);

}

}

/* Fetch characters */

async function fetchCharacters(){

try{

const search = characterSearch.value;

const response = await fetch(`https://rickandmortyapi.com/api/character/?name=${search}`);

const data = await response.json();

displayCharacters(data.results);

}catch(error){

console.log("Error loading characters", error);

}

}

/* Event listeners */

countriesBtn.addEventListener("click", fetchCountries);

usersBtn.addEventListener("click", fetchUsers);

charactersBtn.addEventListener("click", fetchCharacters);


/* Display countries */

function displayCountries(countries){

results.innerHTML = "";

countries.forEach(country => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${country.name.common}</h3>
<p>Capital: ${country.capital}</p>
<p>Population: ${country.population}</p>
`;

results.appendChild(card);

});

}

/* Display users */

function displayUsers(users){

results.innerHTML = "";

users.forEach(user => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>${user.name}</h3>
<p>Email: ${user.email}</p>
<p>City: ${user.address.city}</p>
`;

results.appendChild(card);

});

}

/* Display characters */

function displayCharacters(characters){

results.innerHTML = "";

characters.forEach(character => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${character.image}">
<h3>${character.name}</h3>
<p>Status: ${character.status}</p>
`;

results.appendChild(card);

});

}

</script>





</body>
</html>
